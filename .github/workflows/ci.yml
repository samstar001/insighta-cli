name: CLI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install typer rich httpx python-dotenv
          pip install ruff

      - name: Lint with Ruff
        run: ruff check . --ignore E501,E402,F401,W291,W293,F841 || true

      - name: Check syntax of all Python files
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('insighta'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          ast.parse(open(path).read())
                          print(f'OK: {path}')
                      except SyntaxError as e:
                          errors.append(f'ERROR: {path}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All files syntax OK')
          "

      - name: Verify CLI files exist
        run: |
          ls insighta/
          echo "CLI structure verified"

      - name: Check package imports
        run: |
          python -c "import typer; print('typer OK')"
          python -c "import rich; print('rich OK')"
          python -c "import httpx; print('httpx OK')"
          echo "All dependencies available"