name: CLI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff

      - name: Lint with Ruff
        run: ruff check . --ignore E501

      - name: Check CLI imports
        run: |
          python -c "from insighta.main import app; print('CLI app OK')"
          python -c "from insighta.auth import login; print('Auth OK')"
          python -c "from insighta.api import make_request; print('API OK')"
          python -c "from insighta.config import load_credentials; print('Config OK')"
          python -c "from insighta.display import print_profiles_table; print('Display OK')"

      - name: Verify CLI commands exist
        run: |
          insighta --help
          insighta profiles --help